<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Bios</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #2a2620;
            --bg-secondary: #3a3530;
            --text-primary: #e8e4dd;
            --text-secondary: #b8b0a8;
            --border: #5a5047;
            --accent: #d4a574;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --sidebar-width: 240px;
        }

        body.light-mode {
            --bg-primary: #d4b896;
            --bg-secondary: #c9a882;
            --text-primary: #3a3020;
            --text-secondary: #664d2a;
            --border: #a87f3d;
            --accent: #8b6f47;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Cinzel', serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
            border-bottom: 1px solid var(--border);
            padding: 30px 20px;
            text-align: center;
            box-shadow: var(--card-shadow);
            margin-left: var(--sidebar-width);
        }

        header h1 {
            font-size: 2.2em;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 10px;
        }

        header p {
            font-size: 0.95em;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, var(--bg-secondary), var(--bg-primary));
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px;
            z-index: 90;
            display: flex;
            flex-direction: column;
        }

        .sidebar-title {
            font-size: 0.9em;
            color: var(--accent);
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .search-container {
            margin-bottom: 20px;
        }

        #searchInput {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Cinzel', serif;
            border-radius: 6px;
            font-size: 0.9em;
        }

        #searchInput::placeholder {
            color: var(--text-secondary);
        }

        .character-list {
            list-style: none;
            flex-grow: 1;
            overflow-y: auto;
        }

        .character-list li {
            padding: 12px;
            margin-bottom: 8px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: grab;
            transition: all 0.3s;
            font-size: 0.95em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .character-list li:active {
            cursor: grabbing;
        }

        .character-list li:hover {
            background-color: var(--bg-secondary);
            box-shadow: var(--card-shadow);
            border-color: var(--accent);
        }

        .character-list li.active {
            background-color: var(--bg-secondary);
            border-color: var(--accent);
            color: var(--accent);
        }

        .character-list li.dragging {
            opacity: 0.5;
            background-color: var(--accent);
        }

        .delete-btn {
            background-color: #cc3333;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8em;
            display: none;
            transition: background-color 0.2s;
        }

        .character-list li.active .delete-btn {
            display: block;
        }

        .delete-btn:hover {
            background-color: #aa0000;
        }

        .add-char-btn {
            padding: 12px;
            margin-top: auto;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 6px;
            font-family: 'Cinzel', serif;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .add-char-btn:hover {
            background-color: var(--bg-secondary);
            border-color: var(--accent);
            color: var(--accent);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            min-height: calc(100vh - 100px);
        }

        .character-slide {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            max-width: 900px;
            margin: 20px auto;
            box-shadow: var(--card-shadow);
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-title {
            font-size: 2em;
            color: var(--accent);
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1.5px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .edit-mode .slide-title {
            cursor: text;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid transparent;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-mode .slide-title:hover {
            background-color: rgba(212, 165, 116, 0.1);
            border-color: var(--accent);
        }

        .edit-mode .slide-title input {
            width: 100%;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 2em;
            border: none;
            background-color: transparent;
            color: var(--accent);
            letter-spacing: 1.5px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-field {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .field-label {
            font-size: 0.8em;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .field-content {
            color: var(--text-primary);
            font-size: 0.95em;
            line-height: 1.6;
            flex-grow: 1;
            cursor: text;
        }

        .edit-mode .field-content {
            cursor: auto;
        }

        .edit-mode .field-content input,
        .edit-mode .field-content textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-family: 'Cinzel', serif;
            border-radius: 4px;
            font-size: 0.95em;
        }

        .edit-mode .field-content textarea {
            resize: vertical;
            min-height: 80px;
        }

        .abilities-list {
            list-style: none;
        }

        .abilities-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }

        .abilities-list li:last-child {
            border-bottom: none;
        }

        .abilities-list li::before {
            content: "▪ ";
            color: var(--accent);
            margin-right: 8px;
        }

        .backstory-section {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .edit-mode .backstory-section textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 1px solid var(--border);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-family: 'Cinzel', serif;
            border-radius: 4px;
        }

        .settings-icon-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 95;
        }

        .settings-icon {
            width: 32px;
            height: 32px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .settings-icon:hover {
            transform: rotate(30deg);
        }

        .settings-menu {
            position: fixed;
            top: 75px;
            right: 30px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            z-index: 96;
            display: none;
            min-width: 180px;
            box-shadow: var(--card-shadow);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .settings-menu.active {
            display: block;
        }

        .settings-option {
            padding: 12px;
            margin: 5px 0;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
        }

        .settings-option:hover {
            background-color: var(--bg-secondary);
            border-color: var(--accent);
            color: var(--accent);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            box-shadow: var(--card-shadow);
            text-align: center;
        }

        .modal-content h2 {
            color: var(--accent);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Cinzel', serif;
            border-radius: 6px;
            font-size: 1em;
        }

        .modal-button {
            padding: 12px 30px;
            margin: 10px;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 6px;
            font-family: 'Cinzel', serif;
            transition: all 0.3s;
            font-size: 1em;
        }

        .modal-button:hover {
            background-color: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .modal-button.cancel {
            background-color: #cc3333;
            border-color: #cc3333;
            color: white;
        }

        .modal-button.cancel:hover {
            background-color: #aa0000;
            border-color: #aa0000;
        }

        .character-species-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            opacity: 0.9;
        }

        .name-field {
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border);
                flex-direction: row;
                flex-wrap: wrap;
                padding-bottom: 20px;
            }

            .sidebar-title {
                width: 100%;
            }

            .search-container {
                width: 100%;
                margin-bottom: 10px;
            }

            .character-list {
                width: 100%;
                flex-grow: 0;
            }

            .character-list li {
                margin-right: 5px;
                margin-bottom: 5px;
            }

            .add-char-btn {
                margin-top: 0;
                width: 100%;
            }

            header {
                margin-left: 0;
            }

            .main-content {
                margin-left: 0;
            }

            .character-slide {
                margin: 10px auto;
                padding: 20px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .settings-icon-container {
                top: 20px;
                right: 20px;
            }

            .settings-menu {
                top: 65px;
                right: 20px;
            }
        }
    </style>
    <script>

        let currentCharacter = null;
        let isEditMode = false;
        let darkMode = true;
        let draggedElement = null;

        function getLoremIpsum(length = 'short') {
            const shortLorem = "Lorem ipsum dolor sit amet";
            const mediumLorem = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt.";

            if (length === 'medium') return mediumLorem;
            if (length === 'long') return longLorem;
            return shortLorem;
        }

        function getSpeciesColor(species) {
            const colors = {
                'Human': '#d4a574',
                'Wolf Hybrid': '#9b8b7e',
                'Fox Hybrid': '#d4915d',
                'Dragon Hybrid': '#c9a884',
                'Dog Hybrid': '#a87f3d',
                'Cat Hybrid': '#c9a574',
                'Moth Hybrid': '#a89fb0',
                'Harpy Hybrid': '#c9a574',
                'Angel': '#d4c5b9',
                'Fallen Angel': '#8b7355',
                'Demon': '#8b5a5a',
                'Vampire': '#7a6a7a',
                'Werewolf': '#9b7a6b',
                'Zombie': '#8a9a7b',
                'Naga': '#b39a74'
            };
            return colors[species] || '#d4a574';
        }

        function getSpeciesSVG(species) {
            const color = getSpeciesColor(species);
            const svgs = {

                'Wolf Hybrid': `<svg viewBox="0 0 100 100" class="character-species-icon"><path d="M 30 20 L 25 10 L 35 15 M 70 20 L 75 10 L 65 15" stroke="${color}" stroke-width="2" fill="none"/><circle cx="50" cy="40" r="25" fill="none" stroke="${color}" stroke-width="2"/><path d="M 50 65 Q 40 75 30 85" stroke="${color}" stroke-width="2" fill="none"/><path d="M 50 65 Q 60 75 70 85" stroke="${color}" stroke-width="2" fill="none"/></svg>`,

        function getSettingsGearSVG() {
            return `<svg viewBox="0 0 24 24" class="settings-icon" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

            </svg>`;
        }

        function loadCharacters() {
            const stored = localStorage.getItem('characters');
            if (stored) {
                characters = JSON.parse(stored);
            } else {
                characters = [

        function saveCharacters() {
            localStorage.setItem('characters', JSON.stringify(characters));
        }

        function loadTheme() {
            const saved = localStorage.getItem('darkMode');
            darkMode = saved !== null ? JSON.parse(saved) : true;
            applyTheme();
        }

        function applyTheme() {
            if (!darkMode) {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
            localStorage.setItem('darkMode', JSON.stringify(darkMode));
        }

        function toggleTheme() {
            darkMode = !darkMode;
            applyTheme();
        }

        function renderCharacterList(filter = '') {
            const list = document.getElementById('characterList');
            list.innerHTML = '';
            const filteredCharacters = characters.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));
            filteredCharacters.forEach((character) => {
                const li = document.createElement('li');
                li.textContent = character.name;
                li.draggable = isEditMode;
                li.className = currentCharacter && currentCharacter.name === character.name ? 'active' : '';
                li.dataset.index = characters.indexOf(character);
                
                li.onclick = () => {
                    currentCharacter = character;
                    renderCharacterList(filter);
                    showInfo(character);
                };

                if (isEditMode) {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.textContent = 'X';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (confirm(`Delete ${character.name}?`)) {
                            characters = characters.filter(c => c.name !== character.name);
                            saveCharacters();
                            currentCharacter = null;
                            renderCharacterList(filter);
                            showWelcome();
                        }
                    };
                    li.appendChild(deleteBtn);
                }

                li.addEventListener('dragstart', (e) => {
                    draggedElement = li;
                    li.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });

                li.addEventListener('dragend', () => {
                    li.classList.remove('dragging');
                    draggedElement = null;
                });

                li.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });

                li.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (draggedElement && draggedElement !== li) {
                        const fromIndex = parseInt(draggedElement.dataset.index);
                        const toIndex = parseInt(li.dataset.index);
                        [characters[fromIndex], characters[toIndex]] = [characters[toIndex], characters[fromIndex]];
                        saveCharacters();
                        renderCharacterList(filter);
                    }
                });

                list.appendChild(li);
            });
        }

        function showInfo(character) {
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div class="character-slide ${isEditMode ? 'edit-mode' : ''}">
                    ${getSpeciesSVG(character.info.species)}
                    <h2 class="slide-title">
                        ${isEditMode ? `<input type="text" value="${character.info.name}" onchange="updateCharacterField('${character.name}', 'info.name', this.value)">` : character.info.name}
                    </h2>
                    <div class="info-grid">
                        <div class="info-field"><span class="field-label">Pronouns</span><div class="field-content">${isEditMode ? `<input type="text" value="${character.info.pronouns}" onchange="updateCharacterField('${character.name}', 'info.pronouns', this.value)">` : character.info.pronouns}</div></div>
                        <div class="info-field"><span class="field-label">Age</span><div class="field-content">${isEditMode ? `<input type="text" value="${character.info.age}" onchange="updateCharacterField('${character.name}', 'info.age', this.value)">` : character.info.age}</div></div>
                        <div class="info-field"><span class="field-label">Date of Birth</span><div class="field-content">${isEditMode ? `<input type="text" value="${character.info.dob}" onchange="updateCharacterField('${character.name}', 'info.dob', this.value)">` : character.info.dob}</div></div>
                        <div class="info-field"><span class="field-label">Species</span><div class="field-content">${isEditMode ? `<input type="text" value="${character.info.species}" onchange="updateCharacterField('${character.name}', 'info.species', this.value)">` : character.info.species}</div></div>
                        <div class="info-field name-field"><span class="field-label">Body Features</span><div class="field-content">${isEditMode ? `<textarea onchange="updateCharacterField('${character.name}', 'info.body', this.value.split('\\n'))">${character.info.body.join('\n')}</textarea>` : `<ul class="abilities-list">${character.info.body.map(b => `<li>${b}</li>`).join('')}</ul>`}</div></div>
                        <div class="info-field name-field"><span class="field-label">Clothing</span><div class="field-content">${isEditMode ? `<textarea onchange="updateCharacterField('${character.name}', 'info.clothing', this.value.split('\\n'))">${character.info.clothing.join('\n')}</textarea>` : `<ul class="abilities-list">${character.info.clothing.map(c => `<li>${c}</li>`).join('')}</ul>`}</div></div>
                        <div class="info-field name-field"><span class="field-label">Abilities</span><div class="field-content">${isEditMode ? `<textarea onchange="updateCharacterField('${character.name}', 'info.abilities', this.value)">${character.info.abilities}</textarea>` : character.info.abilities}</div></div>
                        <div class="info-field name-field"><span class="field-label">Personality Traits</span><div class="field-content">${isEditMode ? `<textarea onchange="updateCharacterField('${character.name}', 'info.personality', this.value.split('\\n'))">${character.info.personality.join('\n')}</textarea>` : `<ul class="abilities-list">${character.info.personality.map(p => `<li>${p}</li>`).join('')}</ul>`}</div></div>
                    </div>
                    <button class="add-char-btn" onclick="showBackstory(currentCharacter)">Backstory</button>
                </div>
            `;
        }

        function showBackstory(character) {
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div class="character-slide ${isEditMode ? 'edit-mode' : ''}">
                    ${getSpeciesSVG(character.info.species)}
                    <h2 class="slide-title">${isEditMode ? `<input type="text" value="Backstory of ${character.info.name}" onchange="updateBackstoryTitle(this.value)">` : `Backstory of ${character.info.name}`}</h2>
                    <div class="backstory-section">${isEditMode ? `<textarea onchange="updateCharacterField('${character.name}', 'backstory', this.value)">${character.backstory}</textarea>` : character.backstory.split('\n\n').map(p => `<p>${p}</p>`).join('')}</div>
                    <button class="add-char-btn" onclick="showInfo(currentCharacter)">Back to Info</button>
                </div>
            `;
        }

        function showWelcome() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `<div class="character-slide"><h2 class="slide-title">Welcome to Character Bios</h2><p style="text-align: center; font-size: 1.1em; line-height: 1.8; color: var(--text-secondary);">Select a character from the list to view their information and backstory.</p></div>`;
        }

        function updateCharacterField(charName, field, value) {
            const character = characters.find(c => c.name === charName);
            if (!character) return;
            const fields = field.split('.');
            let obj = character;
            for (let i = 0; i < fields.length - 1; i++) {
                obj = obj[fields[i]];
            }
            obj[fields[fields.length - 1]] = value;
            saveCharacters();
        }

        function updateBackstoryTitle(newTitle) {
            if (currentCharacter) saveCharacters();
        }

        function toggleSettingsMenu() {
            const menu = document.getElementById('settingsMenu');
            menu.classList.toggle('active');
        }

        function openPasswordModal() {
            document.getElementById('passwordModal').classList.add('active');
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('active');
        }

        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            if (password === '12345') {
                isEditMode = !isEditMode;
                closePasswordModal();
                document.getElementById('passwordInput').value = '';
                document.getElementById('settingsMenu').classList.remove('active');
                if (currentCharacter) showInfo(currentCharacter);
                renderCharacterList();
            } else {
                alert('Incorrect password!');
                document.getElementById('passwordInput').value = '';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCharacters();
            loadTheme();
            renderCharacterList();
            showWelcome();

            document.getElementById('searchInput').addEventListener('keyup', (e) => {
                renderCharacterList(e.target.value);
            });

            document.querySelector('.settings-icon-container').innerHTML = getSettingsGearSVG();
            document.querySelector('.settings-icon').addEventListener('click', toggleSettingsMenu);

            document.getElementById('themeToggle').addEventListener('click', () => {
                toggleTheme();
                toggleSettingsMenu();
            });

            document.getElementById('editToggle').addEventListener('click', openPasswordModal);

            document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkPassword();
            });

            document.getElementById('submitPassword').addEventListener('click', checkPassword);
            document.getElementById('cancelPassword').addEventListener('click', closePasswordModal);

            document.getElementById('addCharBtn').addEventListener('click', () => {
                const name = prompt('Enter character name:');
                if (!name) return;
                const newChar = {
                    name: name,
                    info: { name: name, pronouns: getLoremIpsum('short'), age: '20', dob: getLoremIpsum('short'), species: 'Human', body: [getLoremIpsum('short'), getLoremIpsum('short'), getLoremIpsum('short'), getLoremIpsum('short'), getLoremIpsum('short')], clothing: [getLoremIpsum('short'), getLoremIpsum('short'), getLoremIpsum('short'), getLoremIpsum('short'), getLoremIpsum('short')], abilities: getLoremIpsum('medium'), personality: [getLoremIpsum('short'), getLoremIpsum('short'), getLoremIpsum('short'), getLoremIpsum('short'), getLoremIpsum('short')] },
                    backstory: getLoremIpsum('long') + '\n\n' + getLoremIpsum('long') + '\n\n' + getLoremIpsum('long')
                };
                characters.push(newChar);
                saveCharacters();
                renderCharacterList();
            });

            document.addEventListener('click', (e) => {
                const settingsContainer = document.querySelector('.settings-icon-container');
                if (!settingsContainer.contains(e.target)) {
                    document.getElementById('settingsMenu').classList.remove('active');
                }
            });
        });
    </script>
</head>
<body>
    <header>
        <h1>Character Bios</h1>
        <p>A comprehensive collection of character information and backstories</p>
    </header>

    <div class="sidebar">
        <div class="sidebar-title">Characters</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search...">
        </div>
        <ul class="character-list" id="characterList"></ul>
        <button class="add-char-btn" id="addCharBtn">Add Character</button>
    </div>

    <div class="main-content" id="mainContent"></div>

    <div class="settings-icon-container" id="settingsIconContainer"></div>
    <div class="settings-menu" id="settingsMenu">
        <button class="settings-option" id="themeToggle">Toggle Theme</button>
        <button class="settings-option" id="editToggle">Edit Mode</button>
    </div>

    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <h2>Enter Password</h2>
            <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
            <button class="modal-button" id="submitPassword">Submit</button>
            <button class="modal-button cancel" id="cancelPassword">Cancel</button>
        </div>
    </div>
</body>
</html>
