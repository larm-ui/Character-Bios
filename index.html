<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Bios</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --bg: #eee8dc;
            --surface: #f7f2e8;
            --surface-2: #e8dfd0;
            --surface-3: #ddd2c2;
            --text: #3e352c;
            --muted: #6f6153;
            --border: #c8baa5;
            --accent: #8d775d;
            --accent-2: #7d6a52;
            --focus: #a38f73;
            --shadow: rgba(72, 58, 42, 0.15);
        }

        body[data-theme="dark"] {
            color-scheme: dark;
            --bg: #1f2023;
            --surface: #292b2f;
            --surface-2: #34373c;
            --surface-3: #3e4248;
            --text: #e3e5e9;
            --muted: #b3b7be;
            --border: #4d525a;
            --accent: #8d9098;
            --accent-2: #9ea2aa;
            --focus: #b6bac2;
            --shadow: rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cinzel', serif;
            background: radial-gradient(circle at top left, var(--surface), var(--bg) 42%, var(--surface-2) 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            position: relative;
            text-align: center;
            margin-bottom: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 96px 24px;
            box-shadow: 0 10px 22px var(--shadow);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 3.5vw, 3rem);
            letter-spacing: 0.02em;
        }

        header p {
            margin: 10px 0 16px;
            color: var(--muted);
            line-height: 1.45;
        }

        .settings-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 44px;
            height: 44px;
            border: 1px solid var(--border);
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: var(--surface-2);
            color: var(--text);
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
        }

        .settings-btn:hover {
            background: var(--surface-3);
            transform: rotate(12deg) scale(1.04);
            border-color: var(--accent);
        }

        .settings-btn:focus-visible,
        .btn:focus-visible,
        input:focus-visible,
        textarea:focus-visible,
        .inline-input:focus-visible,
        .inline-textarea:focus-visible {
            outline: 2px solid var(--focus);
            outline-offset: 2px;
        }

        .settings-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.7;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #search {
            width: min(100%, 380px);
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            font-family: 'Cinzel', serif;
            font-size: 1rem;
        }

        .layout {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 20px;
        }

        nav,
        main {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 10px 22px var(--shadow);
        }

        nav {
            max-height: 72vh;
            overflow: auto;
            padding: 14px;
        }

        nav ul {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 10px;
        }

        .char-item {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            position: relative;
        }

        .char-item.dragging {
            opacity: 0.62;
        }

        .char-item.drop-before::before,
        .char-item.drop-after::after {
            content: "";
            position: absolute;
            left: 8px;
            right: 8px;
            height: 2px;
            background: var(--accent);
        }

        .char-item.drop-before::before {
            top: -1px;
        }

        .char-item.drop-after::after {
            bottom: -1px;
        }

        .char-item-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .char-name {
            margin: 0;
            font-size: 1rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .char-actions {
            display: flex;
            gap: 6px;
        }

        .btn {
            border: 1px solid var(--border);
            background: var(--surface-3);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            padding: 7px 10px;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent-2);
            color: #f7f5f2;
        }

        .btn.active {
            background: var(--accent-2);
            border-color: var(--accent-2);
            color: #f7f5f2;
        }

        .mini {
            font-size: 0.8rem;
            padding: 5px 8px;
        }

        .drag-label {
            margin-top: 8px;
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        main {
            min-height: 72vh;
            max-height: 72vh;
            overflow: auto;
            padding: 22px;
        }

        .placeholder {
            margin: 0;
            color: var(--muted);
        }

        .character-card {
            display: grid;
            gap: 18px;
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .card-title {
            margin: 0;
            font-size: clamp(1.5rem, 2.2vw, 2.2rem);
        }

        .decoration {
            width: 64px;
            height: 64px;
            display: grid;
            place-items: center;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 50%;
            flex: 0 0 auto;
        }

        .field-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .field {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
        }

        .field label {
            display: block;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .field p,
        .field ul {
            margin: 0;
            line-height: 1.4;
        }

        .field ul {
            padding-left: 20px;
        }

        .inline-input,
        .inline-textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            padding: 8px 10px;
        }

        .inline-textarea {
            min-height: 86px;
            resize: vertical;
            line-height: 1.35;
        }

        .edit-state {
            margin: 0;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(20, 22, 25, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 16px;
        }

        .modal.open {
            display: flex;
        }

        .modal-panel {
            width: min(100%, 560px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 22px 40px var(--shadow);
            padding: 60px;
            display: grid;
            gap: 14px;
        }

        .modal-panel h2 {
            margin: 0;
        }

        .modal-panel p {
            margin: 0;
            color: var(--muted);
        }

        #password-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface-2);
            color: var(--text);
            font-family: 'Cinzel', serif;
            font-size: 1.125rem;
            padding: 12px 12px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status {
            margin: 0;
            min-height: 1.2em;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        ::-webkit-scrollbar {
            width: 11px;
            height: 11px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface-2);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 999px;
            border: 2px solid var(--surface-2);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-2);
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--surface-2);
        }

        @media (max-width: 980px) {
            .layout {
                grid-template-columns: 1fr;
            }

            nav,
            main {
                max-height: none;
            }

            header {
                padding: 20px 64px 24px;
            }

            .field-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 14px;
            }

            header {
                padding: 18px 52px 18px;
            }

            .settings-btn {
                width: 40px;
                height: 40px;
                top: 12px;
                right: 12px;
            }

            .modal-panel {
                padding: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <button type="button" class="settings-btn" id="open-settings" aria-label="Open settings">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="3.25"></circle>
                    <path d="M12 2.75v2.1M12 19.15v2.1M21.25 12h-2.1M4.85 12h-2.1M18.52 5.48l-1.48 1.48M6.96 17.04l-1.48 1.48M18.52 18.52l-1.48-1.48M6.96 6.96L5.48 5.48"></path>
                </svg>
            </button>
            <h1>Character Bios</h1>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
            <input type="text" id="search" placeholder="Search characters...">
        </header>
        <div class="layout">
        <nav>
            <ul id="character-list">
                <!-- Dropdowns will be populated by JS -->
            </ul>
        </nav>
        <main id="content">
            <!-- Content will be loaded here -->
        </main>
        </div>
    </div>

    <div class="modal" id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal-panel">
            <h2 id="settings-title">Settings</h2>
            <p>Use this panel to switch themes and enter edit mode.</p>
            <label for="password-input">Edit Mode Password</label>
            <input id="password-input" type="password" placeholder="Enter password">
            <div class="modal-actions">
                <button class="btn" type="button" id="unlock-edit">Unlock Edit Mode</button>
                <button class="btn" type="button" id="toggle-theme">Toggle Theme</button>
                <button class="btn" type="button" id="close-settings">Close</button>
            </div>
            <p class="status" id="modal-status" aria-live="polite"></p>
        </div>
    </div>

    <script>
        (function () {
            const SPECIES = [
                'Human',
                'Wolf Hybrid',
                'Fox Hybrid',
                'Dragon Hybrid',
                'Dog Hybrid',
                'Cat Hybrid',
                'Moth Hybrid',
                'Harpy Hybrid',
                'Angel',
                'Fallen Angel',
                'Demon',
                'Vampire',
                'Werewolf',
                'Zombie',
                'Naga'
            ];

            const STORAGE_KEYS = {
                data: 'characterBiosDataV2',
                order: 'characterBiosOrderV2',
                theme: 'characterBiosThemeV1'
            };

            const DEFAULT_PASS = 'edit';

            function createCharacter(species) {
                return {
                    id: species.toLowerCase().replace(/\s+/g, '-'),
                    species: species,
                    info: {
                        name: species,
                        pronouns: 'dolor sit',
                        age: species === 'Werewolf' ? '' : 'amet',
                        dob: 'consectetur',
                        species: 'adipiscing',
                        body: ['elit', 'sed do', 'eiusmod', 'tempor', 'incididunt'],
                        clothing: ['ut labore', 'et dolore', 'magna aliqua', 'ut enim', 'ad minim'],
                        abilities: 'veniam quis nostrud',
                        personality: ['exercitation', 'ullamco laboris', 'nisi ut aliquip', 'ex ea commodo', 'consequat']
                    },
                    backstory:
                        'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. '
                        + 'Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. '
                        + 'Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.'
                };
            }

            function loadCharacters() {
                const raw = localStorage.getItem(STORAGE_KEYS.data);
                if (raw) {
                    try {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed) && parsed.length) {
                            return parsed;
                        }
                    } catch (error) {
                        console.warn('Could not parse stored data.', error);
                    }
                }
                return SPECIES.map(createCharacter);
            }

            let characters = loadCharacters();
            const orderRaw = localStorage.getItem(STORAGE_KEYS.order);
            if (orderRaw) {
                try {
                    const order = JSON.parse(orderRaw);
                    if (Array.isArray(order)) {
                        const indexMap = new Map(characters.map((c) => [c.id, c]));
                        const sorted = order.map((id) => indexMap.get(id)).filter(Boolean);
                        const leftovers = characters.filter((c) => !order.includes(c.id));
                        characters = sorted.concat(leftovers);
                    }
                } catch (error) {
                    console.warn('Could not parse stored order.', error);
                }
            }

            const searchInput = document.getElementById('search');
            const characterList = document.getElementById('character-list');
            const content = document.getElementById('content');
            const modal = document.getElementById('settings-modal');
            const openSettingsBtn = document.getElementById('open-settings');
            const closeSettingsBtn = document.getElementById('close-settings');
            const unlockEditBtn = document.getElementById('unlock-edit');
            const toggleThemeBtn = document.getElementById('toggle-theme');
            const passwordInput = document.getElementById('password-input');
            const modalStatus = document.getElementById('modal-status');

            let selectedId = characters[0] ? characters[0].id : null;
            let selectedView = 'info';
            let editMode = false;
            let query = '';
            let draggedId = null;

            function saveCharacters() {
                localStorage.setItem(STORAGE_KEYS.data, JSON.stringify(characters));
                localStorage.setItem(STORAGE_KEYS.order, JSON.stringify(characters.map((c) => c.id)));
            }

            function getDisplayName(character) {
                const n = (character.info && character.info.name ? character.info.name : '').trim();
                return n || character.species;
            }

            function getFilteredCharacters() {
                if (!query) {
                    return characters;
                }
                return characters.filter((c) => getDisplayName(c).toLowerCase().includes(query) || c.species.toLowerCase().includes(query));
            }

            function setTheme(theme) {
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem(STORAGE_KEYS.theme, theme);
            }

            function initTheme() {
                const stored = localStorage.getItem(STORAGE_KEYS.theme);
                if (stored === 'light' || stored === 'dark') {
                    setTheme(stored);
                    return;
                }
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                setTheme(prefersDark ? 'dark' : 'light');
            }

            function clearDropIndicators() {
                document.querySelectorAll('.char-item.drop-before, .char-item.drop-after').forEach((el) => {
                    el.classList.remove('drop-before', 'drop-after');
                    delete el.dataset.dropPosition;
                });
            }

            function reorderCharacters(dragId, targetId, dropPosition) {
                if (!dragId || !targetId || dragId === targetId) {
                    return;
                }

                const dragIndex = characters.findIndex((c) => c.id === dragId);
                const targetIndexBefore = characters.findIndex((c) => c.id === targetId);
                if (dragIndex < 0 || targetIndexBefore < 0) {
                    return;
                }

                const draggedItem = characters.splice(dragIndex, 1)[0];
                const targetIndexAfter = characters.findIndex((c) => c.id === targetId);
                const insertionIndex = dropPosition === 'after' ? targetIndexAfter + 1 : targetIndexAfter;
                characters.splice(insertionIndex, 0, draggedItem);
                saveCharacters();
            }

            function renderCharacterList() {
                const filtered = getFilteredCharacters();
                characterList.innerHTML = '';

                filtered.forEach((character) => {
                    const li = document.createElement('li');
                    li.className = 'char-item';
                    li.setAttribute('draggable', 'true');
                    li.dataset.id = character.id;

                    li.addEventListener('dragstart', (event) => {
                        draggedId = character.id;
                        li.classList.add('dragging');
                        event.dataTransfer.effectAllowed = 'move';
                    });

                    li.addEventListener('dragend', () => {
                        draggedId = null;
                        li.classList.remove('dragging');
                        clearDropIndicators();
                    });

                    li.addEventListener('dragover', (event) => {
                        event.preventDefault();
                        if (!draggedId || draggedId === character.id) {
                            return;
                        }
                        const rect = li.getBoundingClientRect();
                        const before = (event.clientY - rect.top) < rect.height / 2;
                        clearDropIndicators();
                        li.classList.add(before ? 'drop-before' : 'drop-after');
                        li.dataset.dropPosition = before ? 'before' : 'after';
                    });

                    li.addEventListener('drop', (event) => {
                        event.preventDefault();
                        const dropPosition = li.dataset.dropPosition === 'after' ? 'after' : 'before';
                        reorderCharacters(draggedId, character.id, dropPosition);
                        clearDropIndicators();
                        renderCharacterList();
                    });

                    const topRow = document.createElement('div');
                    topRow.className = 'char-item-top';

                    const nameEl = document.createElement('h3');
                    nameEl.className = 'char-name';
                    nameEl.textContent = getDisplayName(character);

                    const actions = document.createElement('div');
                    actions.className = 'char-actions';

                    const infoBtn = document.createElement('button');
                    infoBtn.type = 'button';
                    infoBtn.className = 'btn mini' + (selectedId === character.id && selectedView === 'info' ? ' active' : '');
                    infoBtn.textContent = 'Info';
                    infoBtn.addEventListener('click', () => {
                        selectedId = character.id;
                        selectedView = 'info';
                        renderCharacterList();
                        renderContent();
                    });

                    const backstoryBtn = document.createElement('button');
                    backstoryBtn.type = 'button';
                    backstoryBtn.className = 'btn mini' + (selectedId === character.id && selectedView === 'backstory' ? ' active' : '');
                    backstoryBtn.textContent = 'Backstory';
                    backstoryBtn.addEventListener('click', () => {
                        selectedId = character.id;
                        selectedView = 'backstory';
                        renderCharacterList();
                        renderContent();
                    });

                    actions.appendChild(infoBtn);
                    actions.appendChild(backstoryBtn);
                    topRow.appendChild(nameEl);
                    topRow.appendChild(actions);

                    const dragLabel = document.createElement('p');
                    dragLabel.className = 'drag-label';
                    dragLabel.textContent = 'Drag to reorder';

                    li.appendChild(topRow);
                    li.appendChild(dragLabel);
                    characterList.appendChild(li);
                });
            }

            function handleInputUpdate(character, fieldPath, value) {
                const [root, key] = fieldPath.split('.');
                if (root === 'info') {
                    character.info[key] = value;
                } else if (root === 'backstory') {
                    character.backstory = value;
                }
                saveCharacters();

                if (fieldPath === 'info.name') {
                    renderCharacterList();
                    const heading = document.querySelector('[data-live-heading]');
                    if (heading) {
                        heading.textContent = getDisplayName(character) + ' - ' + (selectedView === 'info' ? 'Info' : 'Backstory');
                    }
                }
            }

            function createField(label, textValue, fieldPath, multiline) {
                const wrapper = document.createElement('div');
                wrapper.className = 'field';

                const labelEl = document.createElement('label');
                labelEl.textContent = label;
                wrapper.appendChild(labelEl);

                if (!editMode) {
                    if (Array.isArray(textValue)) {
                        const ul = document.createElement('ul');
                        textValue.forEach((item) => {
                            const li = document.createElement('li');
                            li.textContent = item;
                            ul.appendChild(li);
                        });
                        wrapper.appendChild(ul);
                    } else {
                        const p = document.createElement('p');
                        p.textContent = textValue;
                        wrapper.appendChild(p);
                    }
                    return wrapper;
                }

                if (Array.isArray(textValue)) {
                    const textarea = document.createElement('textarea');
                    textarea.className = 'inline-textarea';
                    textarea.value = textValue.join('\n');
                    textarea.addEventListener('input', () => {
                        const list = textarea.value.split('\n').map((v) => v.trim()).filter(Boolean);
                        handleInputUpdate(currentCharacter(), fieldPath, list);
                    });
                    wrapper.appendChild(textarea);
                    return wrapper;
                }

                if (multiline) {
                    const textarea = document.createElement('textarea');
                    textarea.className = 'inline-textarea';
                    textarea.value = textValue;
                    textarea.addEventListener('input', () => handleInputUpdate(currentCharacter(), fieldPath, textarea.value));
                    wrapper.appendChild(textarea);
                    return wrapper;
                }

                const input = document.createElement('input');
                input.className = 'inline-input';
                input.type = 'text';
                input.value = textValue;
                input.addEventListener('input', () => handleInputUpdate(currentCharacter(), fieldPath, input.value));
                wrapper.appendChild(input);
                return wrapper;
            }

                const top = document.createElement('div');
                top.className = 'card-top';

                const title = document.createElement('h2');
                title.className = 'card-title';
                title.setAttribute('data-live-heading', 'true');
                title.textContent = getDisplayName(character) + ' - ' + (selectedView === 'info' ? 'Info' : 'Backstory');

                const decoration = document.createElement('div');
                decoration.className = 'decoration';
                decoration.innerHTML = getSpeciesSVG(character.species);

                top.appendChild(title);
                top.appendChild(decoration);
                wrapper.appendChild(top);

                const editState = document.createElement('p');
                editState.className = 'edit-state';
                editState.textContent = editMode ? 'Edit mode is active. Changes save automatically.' : 'Read-only mode. Open settings to unlock editing.';
                wrapper.appendChild(editState);

                if (selectedView === 'info') {
                    const grid = document.createElement('div');
                    grid.className = 'field-grid';
                    grid.appendChild(createField('Name', character.info.name, 'info.name', false));
                    grid.appendChild(createField('Pronouns', character.info.pronouns, 'info.pronouns', false));
                    grid.appendChild(createField('Age', character.info.age, 'info.age', false));
                    grid.appendChild(createField('D.O.B', character.info.dob, 'info.dob', false));
                    grid.appendChild(createField('Species', character.info.species, 'info.species', false));
                    grid.appendChild(createField('Abilities/Notes', character.info.abilities, 'info.abilities', true));
                    grid.appendChild(createField('Body', character.info.body, 'info.body', true));
                    grid.appendChild(createField('Clothing', character.info.clothing, 'info.clothing', true));
                    grid.appendChild(createField('Personality', character.info.personality, 'info.personality', true));
                    wrapper.appendChild(grid);
                } else {
                    wrapper.appendChild(createField('Backstory', character.backstory, 'backstory.text', true));
                }

                content.innerHTML = '';
                content.appendChild(wrapper);
            }

            function openModal() {
                modal.classList.add('open');
                modalStatus.textContent = '';
                setTimeout(() => passwordInput.focus(), 30);
            }

            function closeModal() {
                modal.classList.remove('open');
            }

            searchInput.addEventListener('input', () => {
                query = searchInput.value.trim().toLowerCase();
                renderCharacterList();
            });

            openSettingsBtn.addEventListener('click', openModal);
            closeSettingsBtn.addEventListener('click', closeModal);

            modal.addEventListener('click', (event) => {
                if (event.target === modal) {
                    closeModal();
                }
            });

            unlockEditBtn.addEventListener('click', () => {
                if (passwordInput.value.trim() === DEFAULT_PASS) {
                    editMode = true;
                    modalStatus.textContent = 'Edit mode unlocked.';
                    renderContent();
                } else {
                    modalStatus.textContent = 'Password not accepted. Try again.';
                }
            });

            toggleThemeBtn.addEventListener('click', () => {
                const current = document.body.getAttribute('data-theme') || 'light';
                setTheme(current === 'dark' ? 'light' : 'dark');
            });

            initTheme();
            renderCharacterList();
            renderContent();
        })();
    </script>
</body>
</html>
