<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Bios</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #2a2620;
            --bg-secondary: #3a3530;
            --text-primary: #e8e4dd;
            --text-secondary: #b8b0a8;
            --border: #5a5047;
            --accent: #d4a574;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --sidebar-width: 240px;
        }

        body.light-mode {
            --bg-primary: #d4b896;
            --bg-secondary: #c9a882;
            --text-primary: #3a3020;
            --text-secondary: #664d2a;
            --border: #a87f3d;
            --accent: #8b6f47;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Cinzel', serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
            border-bottom: 1px solid var(--border);
            padding: 30px 20px;
            text-align: center;
            box-shadow: var(--card-shadow);
            margin-left: var(--sidebar-width);
        }

        header h1 {
            font-size: 2.2em;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 10px;
        }

        header p {
            font-size: 0.95em;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, var(--bg-secondary), var(--bg-primary));
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px;
            z-index: 90;
            display: flex;
            flex-direction: column;
        }

        .sidebar-title {
            font-size: 0.9em;
            color: var(--accent);
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .search-container {
            margin-bottom: 20px;
        }

        #searchInput {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Cinzel', serif;
            border-radius: 6px;
            font-size: 0.9em;
        }

        #searchInput::placeholder {
            color: var(--text-secondary);
        }

        .character-list {
            list-style: none;
            flex-grow: 1;
            overflow-y: auto;
        }

        .character-list li {
            padding: 12px;
            margin-bottom: 8px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: grab;
            transition: all 0.3s;
            font-size: 0.95em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .character-list li:active {
            cursor: grabbing;
        }

        .character-list li:hover {
            background-color: var(--bg-secondary);
            box-shadow: var(--card-shadow);
            border-color: var(--accent);
        }

        .character-list li.active {
            background-color: var(--bg-secondary);
            border-color: var(--accent);
            color: var(--accent);
        }

        .character-list li.dragging {
            opacity: 0.5;
            background-color: var(--accent);
        }

        .delete-btn {
            background-color: #cc3333;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8em;
            display: none;
            transition: background-color 0.2s;
        }

        .character-list li.active .delete-btn {
            display: block;
        }

        .delete-btn:hover {
            background-color: #aa0000;
        }

        .add-char-btn {
            padding: 12px;
            margin-top: auto;
            border: 1px solid var(--border);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 6px;
            font-family: 'Cinzel', serif;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .add-char-btn:hover {
            background-color: var(--bg-secondary);
            border-color: var(--accent);
            color: var(--accent);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            min-height: calc(100vh - 100px);
        }

        .character-slide {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            max-width: 900px;
            margin: 20px auto;
            box-shadow: var(--card-shadow);
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-title {
            font-size: 2em;
            color: var(--accent);
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1.5px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .edit-mode .slide-title {
            cursor: text;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid transparent;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-mode .slide-title:hover {
            background-color: rgba(212, 165, 116, 0.1);
            border-color: var(--accent);
        }

        .edit-mode .slide-title input {
            width: 100%;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 2em;
            border: none;
            background-color: transparent;
            color: var(--accent);
            letter-spacing: 1.5px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-field {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .field-label {
            font-size: 0.8em;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .field-content {
            color: var(--text-primary);
            font-size: 0.95em;
            line-height: 1.6;
            flex-grow: 1;
            cursor: text;
        }

        .edit-mode .field-content {
            cursor: auto;
        }

        .edit-mode .field-content input,
        .edit-mode .field-content textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-family: 'Cinzel', serif;
            border-radius: 4px;
            font-size: 0.95em;
        }

        .edit-mode .field-content textarea {
            resize: vertical;
            min-height: 80px;
        }

        .abilities-list {
            list-style: none;
        }

        .abilities-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }

        .abilities-list li:last-child {
            border-bottom: none;
        }

        .abilities-list li::before {
            content: "▪ ";
            color: var(--accent);
            margin-right: 8px;
        }

        .backstory-section {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .edit-mode .backstory-section textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 1px solid var(--border);
            background-color: var(--bg-secondary);
