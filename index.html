        body {
            font-family: 'Cinzel', serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        #search {
            padding: 10px;
            width: 300px;
            font-family: 'Cinzel', serif;
            font-size: 1em;
            border: 2px solid #f0f0f0;
            border-radius: 5px;
            background-color: #333;
            color: #f0f0f0;
            margin-top: 20px;
        }

        nav {
            float: left;
            width: 250px;
            margin-right: 20px;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav li {
            margin-bottom: 10px;
        }

        .dropdown {
            background-color: #333;
            border-radius: 5px;
            overflow: hidden;
        }

        .dropdown-toggle {
            background-color: #444;
            color: #f0f0f0;
            border: none;
            padding: 10px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-family: 'Cinzel', serif;
        }

        .dropdown-content {
            display: none;
            background-color: #555;
        }

        .dropdown-content button {
            background: none;
            border: none;
            color: #f0f0f0;
            padding: 10px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-family: 'Cinzel', serif;
        }

        .dropdown-content button:hover {
            background-color: #666;
        }

        main {
            margin-left: 270px;
            background-color: #222;
            padding: 20px;
            border-radius: 5px;
            min-height: 600px;
        }

        .character-info {
            display: none;
        }

        .character-info.active {
            display: block;
        }

        .decoration {
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .field {
            margin-bottom: 15px;
        }

        .field label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .field p, .field ul {
            margin: 0;
            padding-left: 20px;
        }

        .field ul {
            list-style: disc;
        }

        .backstory {
            margin-top: 30px;
        }

        .backstory h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .backstory p {
            line-height: 1.6;
            margin-bottom: 15px;
        }
    </style>
</head>

        document.addEventListener('DOMContentLoaded', function() {
            const characterList = document.getElementById('character-list');
            const content = document.getElementById('content');
            const searchInput = document.getElementById('search');

            let filteredCharacters = characters;

            function renderCharacterList() {
                characterList.innerHTML = '';
                filteredCharacters.forEach((character, index) => {
                    const li = document.createElement('li');
                    const dropdown = document.createElement('div');
                    dropdown.className = 'dropdown';

                    const toggle = document.createElement('button');
                    toggle.className = 'dropdown-toggle';
                    toggle.textContent = character.name;
                    toggle.addEventListener('click', () => {
                        const content = dropdown.querySelector('.dropdown-content');
                        content.style.display = content.style.display === 'block' ? 'none' : 'block';
                    });

                    const dropdownContent = document.createElement('div');
                    dropdownContent.className = 'dropdown-content';

                    const infoBtn = document.createElement('button');
                    infoBtn.textContent = 'Info';
                    infoBtn.addEventListener('click', () => showInfo(character));

                    const backstoryBtn = document.createElement('button');
                    backstoryBtn.textContent = 'Backstory';
                    backstoryBtn.addEventListener('click', () => showBackstory(character));

                    dropdownContent.appendChild(infoBtn);
                    dropdownContent.appendChild(backstoryBtn);

                    dropdown.appendChild(toggle);
                    dropdown.appendChild(dropdownContent);
                    li.appendChild(dropdown);
                    characterList.appendChild(li);
                });
            }

            searchInput.addEventListener('input', function() {
                const query = searchInput.value.toLowerCase();
                filteredCharacters = characters.filter(character => character.name.toLowerCase().includes(query));
                renderCharacterList();
            });

            function showInfo(character) {
                const svg = getSpeciesSVG(character.name);
                content.innerHTML = `
                    <div class="character-info active">
                        <div class="decoration">${svg}</div>
                        <h2>${character.name} - Info</h2>
                        <div class="field">
                            <label>Name:</label>
                            <p>${character.info.name}</p>
                        </div>
                        <div class="field">
                            <label>Pronouns:</label>
                            <p>${character.info.pronouns}</p>
                        </div>
                        <div class="field">
                            <label>Age:</label>
                            <p>${character.info.age}</p>
                        </div>
                        <div class="field">
                            <label>D.O.B:</label>
                            <p>${character.info.dob}</p>
                        </div>
                        <div class="field">
                            <label>Species:</label>
                            <p>${character.info.species}</p>
                        </div>
                        <div class="field">
                            <label>Body:</label>
                            <ul>${character.info.body.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>
                        <div class="field">
                            <label>Clothing:</label>
                            <ul>${character.info.clothing.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>
                        <div class="field">
                            <label>Abilities/Notes:</label>
                            <p>${character.info.abilities}</p>
                        </div>
                        <div class="field">
                            <label>Personality:</label>
                            <ul>${character.info.personality.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>
                    </div>
                `;
            }

                const svg = getSpeciesSVG(character.name);
                content.innerHTML = `
                    <div class="character-info active">
                        <div class="decoration">${svg}</div>
                        <h2>${character.name} - Backstory</h2>
                        <div class="backstory">
                            <h3>Backstory</h3>

                    'Moth Hybrid': '<svg width="50" height="50"><path d="M25 5 L35 15 L25 25 L15 15 Z" fill="#4B0082"/></svg>',
